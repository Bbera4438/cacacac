{% extends "base.html" %}
{% block title %}Вход{% endblock %}
{% block content %}
<div class="auth-container">
    <h1 class="section-title" style="font-size: 2rem; margin-bottom: 20px;">ВОЙТИ</h1>
    {% if error %}
    <p class="error-message">{{ error }}</p>
    {% endif %}
    <form method="post" action="{{ url_for('login') }}">
        <input type="text" name="login" placeholder="Логин" required>
        <input type="password" name="password" placeholder="Пароль" required>
        <button type="submit" class="btn btn-buy" style="width: 100%;">Войти</button>
    </form>
    <div style="margin-top: 15px;">
        <a href="{{ url_for('steam_login') }}" class="btn btn-steam" style="display: flex; align-items: center; justify-content: center; gap: 8px; padding: 10px;">
            <img src="{{ url_for('static', filename='images/steam-icon.png') }}" alt="Steam" style="height: 18px;"> Войти через Steam
        </a>
    </div>
    <p class="auth-link">Нет аккаунта? <a href="{{ url_for('register') }}">Зарегистрироваться</a></p>
</div>
{% endblock %}
